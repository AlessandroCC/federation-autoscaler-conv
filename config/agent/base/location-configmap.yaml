# Per-cluster region, mounted into the agent (both roles) and re-read on every
# cycle (so the region can change without a pod restart).
#
# `location.yaml` is a YAML/JSON object with a single `region` key, e.g.:
#   region: "QC"
# The region code must be one the mock services know (QC, LOM, CA, HE, 13, NSW,
# IDF, SP, SG, ENG). Providers use it to fetch their carbon intensity (mock-eco)
# and coordinates (mock-geo) and advertise both; the consumer uses it to fetch
# its own coordinates and push them on the heartbeat (for the latency strategy).
#
# Ships EMPTY by default so the base behaviour is unchanged: an empty file ⇒ no
# region ⇒ the cluster opts out of the eco/latency strategies. The fa_provider /
# fa_consumer Ansible roles overwrite location.yaml per cluster; operators
# applying the raw overlay can edit it here or `kubectl patch configmap
# agent-location` (see deploy/ansible/samples/*-location.yaml).
apiVersion: v1
kind: ConfigMap
metadata:
  name: agent-location
  namespace: federation-autoscaler-system
data:
  location.yaml: ""
