# Per-provider advertised-capacity caps, mounted into the provider agent and
# re-read on every advertisement cycle (so the cap can change without a pod
# restart).
#
# `capacity.yaml` is a YAML/JSON map of resource-name → cap, one entry per
# resource (cpu / memory / nvidia.com/gpu). Each value is EITHER:
#   • a PERCENTAGE of allocatable — a bare integer (cpu: 80) or a "N%" string
#     (cpu: "80%"). A value in (0,100) advertises that fraction; 0 advertises
#     none; 100 or any value >100 advertises the full allocatable.
#   • a FIXED absolute amount — a Kubernetes quantity WITH a unit, quoted
#     (memory: "8Gi", cpu: "4000m"). The resource is capped at
#     min(fixed, allocatable), so it only ever lowers what is advertised.
# An unlisted resource, or a negative percent, advertises the full allocatable.
# The Broker derives chunk counts from the (already-capped) advertised capacity,
# so capping here naturally lowers the chunks this provider offers.
#
# Ships EMPTY by default so the base behaviour is unchanged: an empty file ⇒ the
# provider advertises its full allocatable ⇒ the Broker treats it as today.
# Unlike prices, this is left for the provider-cluster admin to set MANUALLY
# (e.g. `kubectl apply -f samples/provider-capacity.yaml` or
# `kubectl patch configmap agent-capacity`); the fa_provider Ansible role does
# not stamp it.
apiVersion: v1
kind: ConfigMap
metadata:
  name: agent-capacity
  namespace: federation-autoscaler-system
data:
  capacity.yaml: ""
