# mock-eco Deployment — a demo-only HTTP stand-in for a grid carbon-intensity
# API, deployed on the dedicated mock cluster. Provider agents fetch their own
# region's current carbon intensity from it (GET /carbon?region=<code>) and
# advertise the value to the Broker; the Broker itself never calls this service.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mock-eco
  namespace: federation-autoscaler-system
  labels:
    app.kubernetes.io/name: federation-autoscaler
    app.kubernetes.io/component: mock-eco
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: federation-autoscaler
      app.kubernetes.io/component: mock-eco
  template:
    metadata:
      labels:
        app.kubernetes.io/name: federation-autoscaler
        app.kubernetes.io/component: mock-eco
    spec:
      terminationGracePeriodSeconds: 10
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: mock-eco
        image: federation-autoscaler/mock-eco:latest
        imagePullPolicy: IfNotPresent
        args:
        - --port=8081
        ports:
        - name: http
          containerPort: 8081
          protocol: TCP
        livenessProbe:
          httpGet:
            path: /healthz
            port: http
          initialDelaySeconds: 5
          periodSeconds: 20
        readinessProbe:
          httpGet:
            path: /healthz
            port: http
          initialDelaySeconds: 2
          periodSeconds: 10
        resources:
          limits:
            cpu: 100m
            memory: 64Mi
          requests:
            cpu: 10m
            memory: 16Mi
        securityContext:
          readOnlyRootFilesystem: true
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
