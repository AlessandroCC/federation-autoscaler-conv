# mock-eco overlay — demo carbon-intensity service for the eco placement
# strategy. Deployed standalone on the dedicated mock cluster (option A): no
# CRDs, no RBAC, no TLS — just a Deployment + ClusterIP Service.
#
# The Ansible fa_mocks role flips the image to the published Docker Hub
# coordinate via `kustomize edit set image` before `kubectl apply -k`.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
- namespace.yaml
- service.yaml
- deployment.yaml

images:
- name: federation-autoscaler/mock-eco
  newName: federation-autoscaler/mock-eco
  newTag: latest
