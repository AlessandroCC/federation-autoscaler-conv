# CONSUMER region — the origin point the Latency strategy measures provider
# distances from. Apply on the consumer cluster:
#
#   kubectl --kubeconfig ~/.kube/consumer-1.yaml apply -f samples/consumer-location.yaml
#
# Overwrites the empty `agent-location` ConfigMap; the consumer agent re-reads it
# every 15 s heartbeat and pushes the region + its coordinates (resolved via
# mock-geo) to the Broker. The Eco strategy ignores this (carbon is per-provider);
# Latency uses it as the origin. Unset ⇒ Latency applies no preference.
#
# ENG = London. With the demo providers at NSW (Sydney, ~17000 km), QC (Montreal,
# ~5200 km) and IDF (Paris, ~340 km), the closest is provider-3 (IDF) → it wins
# the Latency strategy.
apiVersion: v1
kind: ConfigMap
metadata:
  name: agent-location
  namespace: federation-autoscaler-system
data:
  location.yaml: |
    region: "ENG"
