# ConsumerPolicy — opt THIS consumer into broker-driven provider selection.
# Apply on the CONSUMER cluster:
#
#   kubectl --kubeconfig ~/.kube/consumer-1.yaml apply -f samples/consumer-policy.yaml
#
# The BROKER (not the Cluster Autoscaler) chooses the provider: on every
# GET /api/v1/nodegroups from this consumer it exposes only the single BEST
# provider that still has capacity (best-first greedy) and masks the rest. CA
# stays metric-agnostic. The Consumer Agent re-reads this CR on every 15 s
# heartbeat, so editing placement.type — or deleting the object — reprioritises
# live (delete it to fall back to the default, no-preference demo where CA's
# neutral expander picks).
#
# placement.type selects WHICH metric "best" means:
#
#   Price    — cheapest priced provider wins. Requires each provider to advertise
#              unitPrices (see provider-1-prices.yaml / provider-2-prices.yaml).
#              With no provider prices set this policy is a no-op.
#
#   Eco      — lowest current carbon intensity wins. Requires each provider to set
#              its region (see provider-*-location.yaml) + --mock-eco-url so it can
#              advertise carbonIntensity. Providers with no carbon are last resort.
#
#   Latency  — geographically closest provider wins (great-circle distance). Needs
#              each provider AND this consumer to set a region (provider-*-location
#              .yaml + consumer-location.yaml) so coordinates are advertised. If the
#              consumer has no location, this policy is a no-op.
#
# Expected winner with the demo samples (all 3 providers' prices + locations +
# consumer-location.yaml applied) — each policy picks a DIFFERENT provider:
#   Price   -> provider-1  (NSW: cheapest, but dirtiest + farthest)
#   Eco     -> provider-2  (QC:  lowest carbon)
#   Latency -> provider-3  (IDF: closest to the ENG/London consumer)
#
# Pick ONE type below (swap the value; the alternatives are shown commented).
apiVersion: autoscaling.federation-autoscaler.io/v1alpha1
kind: ConsumerPolicy
metadata:
  name: default
  namespace: federation-autoscaler-system
spec:
  placement:
    type: Price
    # type: Eco
    # type: Latency
