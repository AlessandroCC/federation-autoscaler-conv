# PROVIDER-1 region — the PRICE-demo winner. Apply on provider-1:
#
#   kubectl --kubeconfig ~/.kube/provider-1.yaml apply -f samples/provider-1-location.yaml
#
# NSW = New South Wales / Sydney: a coal-heavy grid → HIGHEST carbon (~650) and,
# for the London consumer, the FARTHEST provider (~17000 km). So provider-1 loses
# both Eco and Latency. Paired with the CHEAPEST prices (provider-1-prices.yaml)
# it is the Price strategy's pick — the classic "cheap but dirty" coal trade-off.
#
# Overwrites the empty `agent-location` ConfigMap; re-read every 30 s advertisement.
apiVersion: v1
kind: ConfigMap
metadata:
  name: agent-location
  namespace: federation-autoscaler-system
data:
  location.yaml: |
    region: "NSW"
