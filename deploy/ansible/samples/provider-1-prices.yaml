# Per-resource unit prices for PROVIDER-1 — the CHEAPEST provider (Price-demo
# winner). Apply on provider-1's cluster:
#
#   kubectl --kubeconfig ~/.kube/provider-1.yaml apply -f samples/provider-1-prices.yaml
#
# Overwrites the empty `agent-prices` ConfigMap; re-read every 30 s advertisement,
# so prices change live with no restart. Values are price-per-unit-per-HOUR; the
# Broker multiplies by the chunk size (2 vCPU / 4 GiB) for a comparable per-chunk
# cost shown as "Cost/chunk" on the dashboard:
#   2 * 0.020 + 4 * 0.003 = 0.052 / chunk-hour   (cheapest — vs 0.100 and 0.124)
# Paired with region NSW (provider-1-location.yaml): cheap coal power — so a
# Price-preferring consumer is placed HERE, even though it's the dirtiest grid.
apiVersion: v1
kind: ConfigMap
metadata:
  name: agent-prices
  namespace: federation-autoscaler-system
data:
  prices.yaml: |
    cpu: "0.020"
    memory: "0.003"
