# PROVIDER-2 region — the ECO-demo winner. Apply on provider-2:
#
#   kubectl --kubeconfig ~/.kube/provider-2.yaml apply -f samples/provider-2-location.yaml
#
# QC = Quebec / Montreal: a hydro grid → LOWEST carbon (~25-40, below every other
# region at every hour), so provider-2 wins the Eco strategy. It sits a mid price
# and is far from the London consumer (~5200 km), so it loses Price and Latency.
#
# Overwrites the empty `agent-location` ConfigMap; re-read every 30 s advertisement.
apiVersion: v1
kind: ConfigMap
metadata:
  name: agent-location
  namespace: federation-autoscaler-system
data:
  location.yaml: |
    region: "QC"
