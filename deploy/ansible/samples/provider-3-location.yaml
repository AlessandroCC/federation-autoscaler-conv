# PROVIDER-3 region — the LATENCY-demo winner. Apply on provider-3:
#
#   kubectl --kubeconfig ~/.kube/provider-3.yaml apply -f samples/provider-3-location.yaml
#
# IDF = Ile-de-France / Paris: for the London consumer this is the CLOSEST
# provider (~340 km), so provider-3 wins the Latency strategy. Its carbon is
# mid (~60-80 — green, but never below Quebec), and it carries the dearest price,
# so it loses both Eco and Price.
#
# Overwrites the empty `agent-location` ConfigMap; re-read every 30 s advertisement.
apiVersion: v1
kind: ConfigMap
metadata:
  name: agent-location
  namespace: federation-autoscaler-system
data:
  location.yaml: |
    region: "IDF"
