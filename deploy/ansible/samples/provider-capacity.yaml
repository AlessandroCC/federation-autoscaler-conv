# Per-resource advertised-capacity percentages for a PROVIDER. Apply on the
# provider's cluster to advertise LESS than its full allocatable:
#
#   kubectl --kubeconfig ~/.kube/provider-1.yaml apply -f samples/provider-capacity.yaml
#
# This overwrites the `agent-capacity` ConfigMap that the provider overlay ships
# empty. The provider agent re-reads it on every 30 s advertisement, so the cap
# changes live with no restart. Each resource's value is EITHER a percentage of
# allocatable OR a fixed absolute amount:
#   cpu    -> "80%" / 80  (percent) OR "4000m" (fixed CPU, quoted, with a unit)
#   memory -> "50%" / 50  (percent) OR "8Gi"   (fixed memory, quoted, with a unit)
# Rules (per resource): a percent in (0,100) advertises that fraction, 0 shares
# none, 100/>100 advertises FULL allocatable; a fixed quantity caps at
# min(fixed, allocatable). An unlisted resource advertises the FULL allocatable.
# Because the Broker derives chunks from the (already-capped) advertised
# capacity, capping a resource lowers the chunks this provider offers (here
# memory is halved, so a memory-bound provider offers ~half its chunks).
# The broker dashboard's "Custom" column shows the capped resources (e.g.
# "mem 50%" or "mem 8Gi"); resources left at full allocatable are not flagged.
#
# Example alternatives (uncomment one):
#   memory: "8Gi"   # fixed: never advertise more than 8 GiB of memory
#   nvidia.com/gpu: 0   # share none of this resource
apiVersion: v1
kind: ConfigMap
metadata:
  name: agent-capacity
  namespace: federation-autoscaler-system
data:
  capacity.yaml: |
    cpu: 100
    memory: 50
